services:
  - type: web
    name: budgetbite
    runtime: docker
    plan: free
    healthCheckPath: /api/me
    envVars:
      - key: SESSION_SECRET
        generateValue: true            # Render generates a stable random secret
      - key: BASE_URL
        sync: false                    # set to your https URL after first deploy
      - key: SWIGGY_CLIENT_ID
        sync: false                    # optional: pre-registered OAuth client id
      - key: COUPON_DB
        value: /data/coupons.db        # shared coupon ledger on the persistent disk
      - key: SESSION_FILE
        value: /data/sessions.json     # logins survive restarts (also on the disk)
    disk:
      name: budgetbite-data            # persists the coupon ledger + sessions
      mountPath: /data
      sizeGB: 1
